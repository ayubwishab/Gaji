<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Gaji Bulanan - Ayub R 2026</title>
    <!-- Library untuk konversi HTML ke DOCX via FileSaver -->
    <script src="https://cdn.jsdelivr.net/gh/evidenceprime/html-docx-js@master/dist/html-docx.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --background: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            color: #0f172a;
        }

        /* Ringkasan Keuangan */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
        }

        .card.success { border-left-color: var(--success); }
        .card.danger { border-left-color: var(--danger); }

        .card-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* Form Tambah Pengeluaran */
        .form-section {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)) auto;
            gap: 1rem;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
        }

        input, select {
            padding: 0.625rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        button {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.98); }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-success { background-color: var(--success); color: white; }
        .btn-success:hover { background: #15803d; }

        .btn-danger { background-color: var(--danger); color: white; }
        .btn-danger:hover { background-color: var(--danger-hover); }

        /* Tabel Data */
        .table-container {
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #f1f5f9;
            font-weight: 600;
        }

        .actions-cell {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
            border-radius: 4px;
        }

        .footer-credit {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* Area Cetak Khusus */
        #cetak-area {
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="cetak-area">
        <header>
            <div>
                <h1>Rekap Pencatatan Gaji Bulanan</h1>
                <p style="color: #64748b; font-size: 0.9rem;">Kelola finansial dan keperluan alokasi dana</p>
            </div>
            <!-- Pilihan Bulan -->
            <div class="form-group" style="min-width: 150px;">
                <select id="bulan-pilihan" onchange="gantiBulan()">
                    <option value="Januari">Januari</option>
                    <option value="Februari">Februari</option>
                    <option value="Maret">Maret</option>
                    <option value="April">April</option>
                    <option value="Mei" selected>Mei</option>
                    <option value="Juni">Juni</option>
                    <option value="Juli">Juli</option>
                    <option value="Agustus">Agustus</option>
                    <option value="September">September</option>
                    <option value="Oktober">Oktober</option>
                    <option value="November">November</option>
                    <option value="Desember">Desember</option>
                </select>
            </div>
        </header>

        <!-- Input Gaji Utama -->
        <div class="form-section" style="background: #eff6ff; border-color: #bfdbfe;">
            <div class="form-row" style="grid-template-columns: 1fr auto;">
                <div class="form-group">
                    <label for="gaji-pokok">Total Gaji Bulan Ini (Rp)</label>
                    <input type="number" id="gaji-pokok" value="5000000" oninput="simpanGajiDanHitung()" placeholder="Masukkan total gaji">
                </div>
                <div></div>
            </div>
        </div>

        <!-- Ringkasan Finansial -->
        <div class="summary-cards">
            <div class="card">
                <div class="card-title">Total Pendapatan</div>
                <div class="card-value" id="view-pendapatan">Rp 0</div>
            </div>
            <div class="card danger">
                <div class="card-title">Total Keperluan</div>
                <div class="card-value" id="view-keperluan">Rp 0</div>
            </div>
            <div class="card success">
                <div class="card-title">Sisa Saldo (Tabungan)</div>
                <div class="card-value" id="view-sisa">Rp 0</div>
            </div>
        </div>

        <!-- Tabel Data Rincian Keperluan -->
        <div class="table-container">
            <table id="tabel-rekap">
                <thead>
                    <tr id="header-row">
                        <th>Keperluan / Alokasi</th>
                        <th>Nominal (Rp)</th>
                        <th>Kategori</th>
                        <th class="no-doc">Aksi</th>
                    </tr>
                </thead>
                <tbody id="body-rekap">
                    <!-- Data di-generate otomatis oleh JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Panel Kontrol & Fitur Tambah Kolom/Baris -->
    <div class="form-section">
        <h3 style="margin-bottom: 1rem; font-size: 1.1rem;">Tambah Keperluan Baru</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="input-nama">Nama Keperluan</label>
                <input type="text" id="input-nama" placeholder="Contoh: Bayar Listrik / Wifi">
            </div>
            <div class="form-group">
                <label for="input-nominal">Nominal (Rp)</label>
                <input type="number" id="input-nominal" placeholder="Contoh: 150000">
            </div>
            <!-- Container Utama Input Dinamis -->
            <div class="form-group" style="display: contents;" id="dynamic-inputs-container">
                <div class="form-group">
                    <label for="input-kategori">Kategori</label>
                    <input type="text" id="input-kategori" placeholder="Contoh: Rutin / Investasi">
                </div>
            </div>
            <button class="btn-primary" onclick="tambahBaris()">Tambah</button>
        </div>
    </div>

    <!-- Fitur Tambah Struktur Kolom Baru & Ekspor -->
    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: space-between; margin-top: 1rem;">
        <div style="display: flex; gap: 0.5rem;">
            <button class="btn-success" onclick="tambahKolomStruktur()">+ Tambah Kolom Struktur Baru</button>
            <button class="btn-danger" style="background-color: #64748b;" onclick="resetSemuaData()">Reset Semua Data</button>
        </div>
        <button class="btn-primary" style="background-color: #0f172a;" onclick="eksporDOCX()">Ekspor ke Word (.docx)</button>
    </div>

    <div class="footer-credit">Made by Ayub R 2026</div>
</div>

<script>
    // Database Default awal jika localStorage masih kosong bersih
    const dataAwalDefault = [
        { id: 1, nama: "Angsuran & Tagihan", nominal: 1200000, kategori: "Wajib" },
        { id: 2, nama: "Belanja Bulanan", nominal: 800000, kategori: "Kebutuhan" },
        { id: 3, nama: "Investasi / Tabungan", nominal: 500000, kategori: "Investasi" }
    ];

    // Mengambil data dari localStorage atau gunakan default jika belum ada
    let dataKeperluan = JSON.parse(localStorage.getItem("rekap_data_keperluan")) || dataAwalDefault;
    let kolomKustom = JSON.parse(localStorage.getItem("rekap_kolom_kustom")) || [];
    let gajiDisimpan = localStorage.getItem("rekap_total_gaji") || "5000000";
    let bulanDisimpan = localStorage.getItem("rekap_bulan_pilihan") || "Mei";

    window.onload = function() {
        document.getElementById("gaji-pokok").value = gajiDisimpan;
        document.getElementById("bulan-pilihan").value = bulanDisimpan;
        
        if (kolomKustom.length > 0) {
            const headerRow = document.getElementById("header-row");
            kolomKustom.forEach(kolom => {
                const th = document.createElement("th");
                th.innerText = kolom;
                headerRow.insertBefore(th, headerRow.lastElementChild);
                tambahFieldInputBaruDOM(kolom);
            });
        }
        
        renderTabel();
    };

    function renderTabel() {
        const tbody = document.getElementById("body-rekap");
        tbody.innerHTML = "";

        dataKeperluan.forEach((item) => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td contenteditable="true" onblur="updateData(${item.id}, 'nama', this.innerText)">${item.nama}</td>
                <td contenteditable="true" style="font-weight: 600;" onblur="updateData(${item.id}, 'nominal', this.innerText, true)">${item.nominal}</td>
                <td contenteditable="true" onblur="updateData(${item.id}, 'kategori', this.innerText)">${item.kategori || '-'}</td>
                ${kolomKustom.map(kolom => `
                    <td contenteditable="true" onblur="updateData(${item.id}, '${kolom}', this.innerText)">${item[kolom] || '-'}</td>
                `).join('')}
                <td class="actions-cell no-doc">
                    <button class="btn-danger btn-sm" onclick="hapusBaris(${item.id})">Hapus</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        hitungKeuangan();
    }

    function updateData(id, field, value, isNumber = false) {
        let item = dataKeperluan.find(d => d.id === id);
        if (item) {
            if (isNumber) {
                let cleanNum = value.replace(/[^0-9]/g, '');
                item[field] = Number(cleanNum) || 0;
            } else {
                item[field] = value.trim();
            }
            saveToStorage();
            hitungKeuangan();
        }
    }

    function simpanGajiDanHitung() {
        const gajiInput = document.getElementById("gaji-pokok").value;
        localStorage.setItem("rekap_total_gaji", gajiInput);
        hitungKeuangan();
    }

    function hitungKeuangan() {
        const gajiInput = document.getElementById("gaji-pokok").value;
        const totalGaji = Number(gajiInput) || 0;

        let totalKeperluan = dataKeperluan.reduce((sum, item) => sum + Number(item.nominal), 0);
        let sisaSaldo = totalGaji - totalKeperluan;

        document.getElementById("view-pendapatan").innerText = formatRupiah(totalGaji);
        document.getElementById("view-keperluan").innerText = formatRupiah(totalKeperluan);
        
        const sisaElement = document.getElementById("view-sisa");
        sisaElement.innerText = formatRupiah(sisaSaldo);

        if (sisaSaldo < 0) {
            sisaElement.style.color = "var(--danger)";
        } else {
            sisaElement.style.color = "var(--success)";
        }
    }

    function tambahBaris() {
        const nama = document.getElementById("input-nama").value;
        const nominal = document.getElementById("input-nominal").value;
        const kategori = document.getElementById("input-kategori").value;

        if (!nama || !nominal) {
            alert("Nama keperluan dan nominal wajib diisi!");
            return;
        }

        let itemBaru = {
            id: Date.now(),
            nama: nama,
            nominal: Number(nominal),
            kategori: kategori || "Rutin"
        };

        kolomKustom.forEach(kolom => {
            const inputKustomVal = document.getElementById(`input-kustom-${kolom}`)?.value;
            itemBaru[kolom] = inputKustomVal || "-";
        });

        dataKeperluan.push(itemBaru);
        saveToStorage();
        renderTabel();

        document.getElementById("input-nama").value = "";
        document.getElementById("input-nominal").value = "";
        document.getElementById("input-kategori").value = "";
        kolomKustom.forEach(kolom => {
            if(document.getElementById(`input-kustom-${kolom}`)) {
                document.getElementById(`input-kustom-${kolom}`).value = "";
            }
        });
    }

    function hapusBaris(id) {
        if(confirm("Apakah kamu yakin ingin menghapus alokasi keperluan ini?")) {
            dataKeperluan = dataKeperluan.filter(item => item.id !== id);
            saveToStorage();
            renderTabel();
        }
    }

    function tambahKolomStruktur() {
        let namaKolomBaru = prompt("Masukkan nama kolom struktur baru:\n(Contoh: Batas Waktu, Keterangan, Urgensi)");
        
        if (namaKolomBaru && namaKolomBaru.trim() !== "") {
            let namaClean = namaKolomBaru.trim();
            
            if(kolomKustom.includes(namaClean)) {
                alert("Kolom dengan nama tersebut sudah ada!");
                return;
            }

            kolomKustom.push(namaClean);
            localStorage.setItem("rekap_kolom_kustom", JSON.stringify(kolomKustom));

            const headerRow = document.getElementById("header-row");
            const th = document.createElement("th");
            th.innerText = namaClean;
            headerRow.insertBefore(th, headerRow.lastElementChild);

            tambahFieldInputBaruDOM(namaClean);

            dataKeperluan.forEach(item => {
                if(!item[namaClean]) item[namaClean] = "-";
            });
            saveToStorage();
            renderTabel();
        }
    }

    function tambahFieldInputBaruDOM(namaKolom) {
        const formContainer = document.getElementById("dynamic-inputs-container");
        const newGroup = document.createElement("div");
        newGroup.className = "form-group";
        newGroup.innerHTML = `
            <label>${namaKolom}</label>
            <input type="text" id="input-kustom-${namaKolom}" placeholder="Isi ${namaKolom}">
        `;
        formContainer.appendChild(newGroup);
    }

    function gantiBulan() {
        const bulan = document.getElementById("bulan-pilihan").value;
        localStorage.setItem("rekap_bulan_pilihan", bulan);
    }

    function saveToStorage() {
        localStorage.setItem("rekap_data_keperluan", JSON.stringify(dataKeperluan));
    }

    function resetSemuaData() {
        if(confirm("Apakah kamu ingin mereset semua data?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function formatRupiah(angka) {
        return "Rp " + angka.toLocaleString("id-ID");
    }

    // Fungsi Inti Baru: Ekspor ke bentuk File Dokumen Word (.docx)
    function eksporDOCX() {
        const bulanText = document.getElementById("bulan-pilihan").value;
        const totalGaji = document.getElementById("gaji-pokok").value;
        
        let totalKeperluan = dataKeperluan.reduce((sum, item) => sum + Number(item.nominal), 0);
        let sisaSaldo = totalGaji - totalKeperluan;

        // Menyusun CSS inline dasar agar tabel di Microsoft Word memiliki border yang rapi saat dibuka
        let gayaTabelWord = `
            <style>
                table { width: 100%; border-collapse: collapse; margin-top: 20px; font-family: Arial, sans-serif; }
                th, td { border: 1px solid #cccccc; padding: 8px; text-align: left; }
                th { background-color: #f2f2f2; font-weight: bold; }
                .text-bold { font-weight: bold; }
            </style>
        `;

        // Membuat template dokumen HTML khusus isi konten Word
        let kontenHtml = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head>
                <title>Rekap Gaji</title>
                ${gayaTabelWord}
            </head>
            <body>
                <h2>Rekap Catatan Gaji Bulanan - Bulan ${bulanText} 2026</h2>
                <hr/>
                <p><b>Total Pendapatan:</b> Rp ${Number(totalGaji).toLocaleString("id-ID")}</p>
                <p><b>Total Keperluan:</b> Rp ${totalKeperluan.toLocaleString("id-ID")}</p>
                <p><b>Sisa Saldo (Tabungan):</b> Rp ${sisaSaldo.toLocaleString("id-ID")}</p>
                <br/>
                <h3>Rincian Alokasi Dana</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Keperluan / Alokasi</th>
                            <th>Nominal</th>
                            <th>Kategori</th>
                            ${kolomKustom.map(kolom => `<th>${kolom}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${dataKeperluan.map(item => `
                            <tr>
                                <td>${item.nama}</td>
                                <td class="text-bold">Rp ${Number(item.nominal).toLocaleString("id-ID")}</td>
                                <td>${item.kategori || '-'}</td>
                                ${kolomKustom.map(kolom => `<td>${item[kolom] || '-'}</td>`).join('')}
                            </tr>
                        `).join
