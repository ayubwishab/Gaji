<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Gaji Bulanan - Ayub R 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --background: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            color: #0f172a;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
        }

        .card.success { border-left-color: var(--success); }
        .card.danger { border-left-color: var(--danger); }

        .card-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .form-section {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)) auto;
            gap: 1rem;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
        }

        input, select {
            padding: 0.625rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        button {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-success { background-color: var(--success); color: white; }
        .btn-success:hover { background: #15803d; }

        .btn-danger { background-color: #64748b; color: white; }
        .btn-danger:hover { background-color: #475569; }

        .table-container {
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #f1f5f9;
            font-weight: 600;
        }

        .footer-credit {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Rekap Pencatatan Gaji Bulanan</h1>
            <p style="color: #64748b; font-size: 0.9rem;">Kelola finansial dan keperluan alokasi dana</p>
        </div>
        <div class="form-group" style="min-width: 150px;">
            <select id="bulan-pilihan" onchange="gantiBulan()">
                <option value="Januari">Januari</option>
                <option value="Februari">Februari</option>
                <option value="Maret">Maret</option>
                <option value="April">April</option>
                <option value="Mei" selected>Mei</option>
                <option value="Juni">Juni</option>
                <option value="Juli">Juli</option>
                <option value="Agustus">Agustus</option>
                <option value="September">September</option>
                <option value="Oktober">Oktober</option>
                <option value="November">November</option>
                <option value="Desember">Desember</option>
            </select>
        </div>
    </header>

    <div class="form-section" style="background: #eff6ff; border-color: #bfdbfe;">
        <div class="form-row" style="grid-template-columns: 1fr;">
            <div class="form-group">
                <label for="gaji-pokok">Total Gaji Bulan Ini (Rp)</label>
                <input type="number" id="gaji-pokok" value="5000000" oninput="simpanGajiDanHitung()" placeholder="Masukkan total gaji">
            </div>
        </div>
    </div>

    <div class="summary-cards">
        <div class="card">
            <div class="card-title">Total Pendapatan</div>
            <div class="card-value" id="view-pendapatan">Rp 0</div>
        </div>
        <div class="card danger">
            <div class="card-title">Total Keperluan</div>
            <div class="card-value" id="view-keperluan">Rp 0</div>
        </div>
        <div class="card success">
            <div class="card-title">Sisa Saldo (Tabungan)</div>
            <div class="card-value" id="view-sisa">Rp 0</div>
        </div>
    </div>

    <div class="table-container">
        <table id="tabel-rekap">
            <thead>
                <tr>
                    <th>Keperluan / Alokasi</th>
                    <th>Nominal (Rp)</th>
                    <th style="width: 80px;">Aksi</th>
                </tr>
            </thead>
            <tbody id="body-rekap">
                </tbody>
        </table>
    </div>

    <div class="form-section">
        <h3 style="margin-bottom: 1rem; font-size: 1.1rem;">Tambah Keperluan Baru</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="input-nama">Nama Keperluan</label>
                <input type="text" id="input-nama" placeholder="Contoh: Bayar Listrik / Wifi">
            </div>
            <div class="form-group">
                <label for="input-nominal">Nominal (Rp)</label>
                <input type="number" id="input-nominal" placeholder="Contoh: 150000">
            </div>
            <button class="btn-primary" onclick="tambahBaris()">Tambah</button>
        </div>
    </div>

    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: space-between; margin-top: 1rem;">
        <button class="btn-danger" onclick="resetSemuaData()">Reset Semua Data</button>
        <button class="btn-success" onclick="eksporExcel()">Ekspor ke Excel (.xlsx)</button>
    </div>

    <div class="footer-credit">Made by Ayub R 2026</div>
</div>

<script>
    const dataAwalDefault = [
        { id: 1, nama: "Angsuran & Tagihan", nominal: 1200000 },
        { id: 2, nama: "Belanja Bulanan", nominal: 800000 }
    ];

    let dataKeperluan = JSON.parse(localStorage.getItem("rekap_data_keperluan")) || dataAwalDefault;
    let gajiDisimpan = localStorage.getItem("rekap_total_gaji") || "5000000";
    let bulanDisimpan = localStorage.getItem("rekap_bulan_pilihan") || "Mei";

    window.onload = function() {
        document.getElementById("gaji-pokok").value = gajiDisimpan;
        document.getElementById("bulan-pilihan").value = bulanDisimpan;
        hitungKeuangan();
        renderTabel();
    };

    function renderTabel() {
        const tbody = document.getElementById("body-rekap");
        tbody.innerHTML = "";

        dataKeperluan.forEach((item) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td contenteditable="true" onblur="updateData(${item.id}, 'nama', this.innerText)">${item.nama}</td>
                <td contenteditable="true" style="font-weight: 600;" onblur="updateData(${item.id}, 'nominal', this.innerText, true)">${item.nominal}</td>
                <td>
                    <button style="padding: 0.25rem 0.5rem; font-size: 0.85rem; background-color:#dc2626; color:white; border-radius:4px;" onclick="hapusBaris(${item.id})">Hapus</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateData(id, field, value, isNumber = false) {
        let item = dataKeperluan.find(d => d.id === id);
        if (item) {
            if (isNumber) {
                let cleanNum = value.replace(/[^0-9]/g, '');
                item[field] = Number(cleanNum) || 0;
            } else {
                item[field] = value.trim();
            }
            saveToStorage();
            hitungKeuangan();
        }
    }

    function simpanGajiDanHitung() {
        const gajiInput = document.getElementById("gaji-pokok").value;
        localStorage.setItem("rekap_total_gaji", gajiInput);
        hitungKeuangan();
    }

    function hitungKeuangan() {
        const gajiInput = document.getElementById("gaji-pokok").value;
        const totalGaji = Number(gajiInput) || 0;

        let totalKeperluan = dataKeperluan.reduce((sum, item) => sum + Number(item.nominal), 0);
        let sisaSaldo = totalGaji - totalKeperluan;

        document.getElementById("view-pendapatan").innerText = formatRupiah(totalGaji);
        document.getElementById("view-keperluan").innerText = formatRupiah(totalKeperluan);
        
        const sisaElement = document.getElementById("view-sisa");
        sisaElement.innerText = formatRupiah(sisaSaldo);

        if (sisaSaldo < 0) {
            sisaElement.style.color = "#dc2626";
        } else {
            sisaElement.style.color = "#16a34a";
        }
    }

    function tambahBaris() {
        const nama = document.getElementById("input-nama").value;
        const nominal = document.getElementById("input-nominal").value;

        if (!nama || !nominal) {
            alert("Nama keperluan dan nominal wajib diisi!");
            return;
        }

        dataKeperluan.push({
            id: Date.now(),
            nama: nama,
            nominal: Number(nominal)
        });
        
        saveToStorage();
        renderTabel();
        hitungKeuangan();

        document.getElementById("input-nama").value = "";
        document.getElementById("input-nominal").value = "";
    }

    function hapusBaris(id) {
        if(confirm("Hapus alokasi ini?")) {
            dataKeperluan = dataKeperluan.filter(item => item.id !== id);
            saveToStorage();
            renderTabel();
            hitungKeuangan();
        }
    }

    function gantiBulan() {
        const bulan = document.getElementById("bulan-pilihan").value;
        localStorage.setItem("rekap_bulan_pilihan", bulan);
    }

    function saveToStorage() {
        localStorage.setItem("rekap_data_keperluan", JSON.stringify(dataKeperluan));
    }

    function resetSemuaData() {
        if(confirm("Reset semua data keuangan?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function formatRupiah(angka) {
        return "Rp " + angka.toLocaleString("id-ID");
    }

    // FUNGSI UTAMA BARU: EKSPOR EXCEL SEBAGAI DATABASE BULANAN YANG KUAT & BERSIH
    function eksporExcel() {
        const bulanText = document.getElementById("bulan-pilihan").value;
        const totalGaji = Number(document.getElementById("gaji-pokok").value) || 0;
        
        let totalKeperluan = dataKeperluan.reduce((sum, item) => sum + Number(item.nominal), 0);
        let sisaSaldo = totalGaji - totalKeperluan;

        // 1. Membuat Susunan Baris Data Excel (Row-by-Row)
        const barisExcel = [
            ["REKAP PENCATATAN GAJI BULANAN"],
            [`Bulan: ${bulanText} 2026`],
            [], // Baris kosong pembatas
            ["RINGKASAN KEUANGAN"],
            ["Total Pendapatan", totalGaji],
            ["Total Keperluan", totalKeperluan],
            ["Sisa Saldo (Tabungan)", sisaSaldo],
            [], // Baris kosong pembatas
            ["RINCIAN ALOKASI KEPERLUAN"],
            ["Nama Keperluan / Alokasi", "Nominal (Rupiah)"] // Header tabel excel
        ];

        // 2. Memasukkan seluruh data dari tabel web ke baris Excel
        dataKeperluan.forEach(item => {
            barisExcel.push([item.nama, item.nominal]);
        });

        // 3. Proses konversi array data menjadi lembar kerja Excel (Worksheet)
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(barisExcel);

        // 4. Format Lebar Kolom otomatis agar teks tidak terpotong (Kolom A & B)
        ws['!cols'] = [{ wch: 30 }, { wch: 20 }];

        // 5. Masukkan lembar data ke file book dan unduh langsung (.xlsx)
        XLSX.utils.book_append_sheet(wb, ws, `Rekap ${bulanText}`);
        XLSX.writeFile(wb, `Rekap_Gaji_${bulanText}_2026.xlsx`);
    }
</script>

</body>
</html>
